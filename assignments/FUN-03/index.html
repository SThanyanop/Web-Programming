<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter — Thanyanop</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <canvas id="petals" aria-hidden="true"></canvas>

    <nav class="top-nav" role="navigation">
        <a class="back-btn" href="../../../index.html">Back to Spellbook</a>
    </nav>

    <main class="counter-wrap" role="main">

        <!-- Spinning gem background decoration -->
        <div class="gem-bg" aria-hidden="true">
            <div class="gem">
                <div class="gf f1"></div>
                <div class="gf f2"></div>
                <div class="gf f3"></div>
                <div class="gf f4"></div>
                <div class="gf f5"></div>
                <div class="gf f6"></div>
            </div>
        </div>

        <div class="card">
            <header class="card-head">
                <p class="card-label">spell counter</p>
                <h1 class="card-title">My First Counter</h1>
                <p class="card-sub">Made with JavaScript — I'm quite proud of this one!</p>
            </header>

            <div class="display-wrap">
                <div class="display" id="display" aria-live="polite" aria-label="Counter value">0</div>
                <p class="display-hint" id="displayHint"></p>
            </div>

            <div class="controls" role="group" aria-label="Counter controls">
                <button class="btn btn-up" onclick="updateCounter(1)" aria-label="Add one">
                    <span class="btn-icon" aria-hidden="true">+</span>
                    <span class="btn-text">Add</span>
                </button>
                <button class="btn btn-down" onclick="updateCounter(-1)" aria-label="Subtract one">
                    <span class="btn-icon" aria-hidden="true">−</span>
                    <span class="btn-text">Subtract</span>
                </button>
                <button class="btn btn-reset" onclick="resetCounter()" aria-label="Reset counter">
                    <span class="btn-icon" aria-hidden="true">↺</span>
                    <span class="btn-text">Reset</span>
                </button>
            </div>
        </div>

        <footer class="page-footer" role="contentinfo">
            <p class="footer-quote"><em>"Even a single flower can brighten a thousand years of solitude."</em></p>
            <p class="footer-credit">Thanyanop · FRA502 Web Programming · FIBO KMUTT</p>
        </footer>

    </main>

    <script src="script.js"></script>
    <script>
        // Petal canvas
        var canvas = document.getElementById('petals');
        var ctx    = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        var motes = [];
        for (var i = 0; i < 34; i++) {
            motes.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                r: 0.8 + Math.random() * 2,
                a: 0.05 + Math.random() * 0.13,
                speed: 0.14 + Math.random() * 0.38,
                drift: (Math.random() - 0.5) * 0.5,
                wave: Math.random() * Math.PI * 2,
                pulse: Math.random() * Math.PI * 2,
                g: Math.random() > 0.5 ? '170,212,180' : '195,228,205'
            });
        }

        (function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (var i = 0; i < motes.length; i++) {
                var m = motes[i];
                m.pulse += 0.006; m.wave += 0.008;
                m.y -= m.speed; m.x += m.drift + Math.sin(m.wave) * 0.4;
                if (m.y < -10) { m.y = canvas.height + 10; m.x = Math.random() * canvas.width; }
                var a = m.a * (0.5 + 0.5 * Math.sin(m.pulse));
                ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(' + m.g + ',' + a + ')'; ctx.fill();
            }
            requestAnimationFrame(animate);
        })();
    </script>
</body>
</html>
